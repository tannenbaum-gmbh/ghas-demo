apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: ghas-demo
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: invalid.example/frontend:latest
          imagePullPolicy: Always
          env:
            - name: AUTHN_BASE_URL
              value: http://authn-service.ghas-demo.svc.cluster.local:5000
            - name: GALLERY_BASE_URL
              value: http://gallery-service.ghas-demo.svc.cluster.local:8081
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 250m
              memory: 512Mi
          readinessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: ghas-demo
spec:
  type: LoadBalancer
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
