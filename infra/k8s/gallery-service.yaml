apiVersion: apps/v1
kind: Deployment
metadata:
  name: gallery-service
  namespace: ghas-demo
  labels:
    app: gallery-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gallery-service
  template:
    metadata:
      labels:
        app: gallery-service
    spec:
      containers:
        - name: gallery-service
          image: invalid.example/gallery-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 250m
              memory: 512Mi
          readinessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: gallery-service
  namespace: ghas-demo
spec:
  type: ClusterIP
  selector:
    app: gallery-service
  ports:
    - port: 8081
      targetPort: 8081
