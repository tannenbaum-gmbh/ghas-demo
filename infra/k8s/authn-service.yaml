apiVersion: apps/v1
kind: Deployment
metadata:
  name: authn-service
  namespace: ghas-demo
  labels:
    app: authn-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: authn-service
  template:
    metadata:
      labels:
        app: authn-service
    spec:
      containers:
        - name: authn-service
          image: invalid.example/authn-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 250m
              memory: 512Mi
          readinessProbe:
            tcpSocket:
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: authn-service
  namespace: ghas-demo
spec:
  type: ClusterIP
  selector:
    app: authn-service
  ports:
    - port: 5000
      targetPort: 5000
