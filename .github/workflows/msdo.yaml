name: MSDO
on:
  push:
    branches:
      - main

jobs:
  sample:
    name: Microsoft Security DevOps

    # Windows and Linux agents are supported
    runs-on: windows-latest

    permissions:
      contents: read
      id-token: write
      actions: read
      # Write access for security-events is only required for customers looking for MSDO results to appear in the codeQL security alerts tab on GitHub (Requires GHAS)
      security-events: write

    steps:

      # Checkout your code repository to scan
      - uses: actions/checkout@v3

      # Run analyzers
      - name: Run Microsoft Security DevOps
        uses: microsoft/security-devops-action@v1.12.0
        id: msdo
        with:
          # templateanalyzer is excluded because it cannot resolve Azure Verified Modules (AVM)
          # public registry module outputs in Bicep files, causing an unrecoverable exit code 21.
          # Remaining tools provide: Python security linting (bandit), IaC/secrets scanning
          # (checkov), and JavaScript security linting (eslint).
          tools: 'bandit, checkov, eslint'
        # Uncomment and configure any of the following parameters as needed:
        #   config: string. Optional. A file path to an MSDO configuration file ('*.gdnconfig').
        #   policy: 'GitHub' | 'microsoft' | 'none'. Optional. The name of a well-known Microsoft policy. Default: GitHub.
        #   categories: string. Optional. A comma-separated list of analyzer categories: 'code', 'artifacts', 'IaC', 'containers'.
        #   languages: string. Optional. A comma-separated list of languages to analyze. Example: 'javascript,typescript'.
        #   tools: string. Optional. Comma-separated list: 'bandit', 'binskim', 'checkov', 'eslint', 'templateanalyzer', 'terrascan', 'trivy'.

      # Upload alerts to the Security tab - required for MSDO results to appear in the codeQL security alerts tab on GitHub (Requires GHAS)
      - name: Upload alerts to Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ steps.msdo.outputs.sarifFile }}

      # Upload alerts file as a workflow artifact - required for MSDO results to appear in the codeQL security alerts tab on GitHub (Requires GHAS)
      - name: Upload alerts file as a workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: alerts
          path: ${{ steps.msdo.outputs.sarifFile }}
