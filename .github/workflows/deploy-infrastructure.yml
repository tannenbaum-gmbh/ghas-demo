name: Deploy Infrastructure

on:
  push:
    branches:
      - main
    paths:
      - 'infra/**'
      - '.github/workflows/deploy-infrastructure.yml'
  workflow_dispatch:
    inputs:
      image_tag:
        description: Container image tag to deploy
        required: false
        type: string
  workflow_call:
    inputs:
      image_tag:
        required: false
        type: string

permissions:
  id-token: write   # required for OIDC token request
  contents: read

jobs:
  deploy:
    name: Deploy Bicep infrastructure
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve OIDC principal ID
        id: oidc-principal
        shell: bash
        run: |
          set -euo pipefail
          if ! principal_id="$(az ad sp show --id "${{ secrets.AZURE_CLIENT_ID }}" --query id -o tsv 2>/tmp/oidc-principal-error.log)"; then
            echo "Failed to resolve service principal object ID for AZURE_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }}"
            cat /tmp/oidc-principal-error.log
            exit 1
          fi
          if [ -z "${principal_id}" ]; then
            echo "Resolved an empty service principal object ID for AZURE_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }}"
            exit 1
          fi
          echo "principal-id=${principal_id}" >> "$GITHUB_OUTPUT"

      - name: Deploy Bicep template
        id: bicep
        uses: azure/arm-deploy@v2
        with:
          scope: resourcegroup
          resourceGroupName: ${{ secrets.AZURE_RESOURCE_GROUP }}
          template: infra/main.bicep
          parameters: >
            infra/main.bicepparam
            imageTag=${{ inputs.image_tag || 'latest' }}
            githubOidcPrincipalId=${{ steps.oidc-principal.outputs.principal-id }}
          failOnStdErr: true

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --name "${{ steps.bicep.outputs.aksClusterName }}" \
            --overwrite-existing
      - name: Deploy to AKS
        env:
          ACR_LOGIN_SERVER: ${{ steps.bicep.outputs.containerRegistryLoginServer }}
          IMAGE_TAG: ${{ inputs.image_tag || 'latest' }}
          K8S_NAMESPACE: ghas-demo
        run: |
          kubectl apply -f infra/k8s/namespace.yaml

          for service in authn-service gallery-service storage-service; do
            kubectl set image -f "infra/k8s/${service}.yaml" "${service}=${ACR_LOGIN_SERVER}/${service}:${IMAGE_TAG}" --local -o yaml | kubectl apply -f -
          done

          kubectl set image -f infra/k8s/frontend.yaml frontend="${ACR_LOGIN_SERVER}/frontend:${IMAGE_TAG}" --local -o yaml \
            | kubectl set env --local -f - AUTHN_BASE_URL="http://authn-service.${K8S_NAMESPACE}.svc.cluster.local:5000" GALLERY_BASE_URL="http://gallery-service.${K8S_NAMESPACE}.svc.cluster.local:8081" -o yaml \
            | kubectl apply -f -
